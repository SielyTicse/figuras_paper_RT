const METRICS = {
  "Corr.": {label: "Corr.", unit: "", cmin: -0.2, cmax: 1, colorscale: PALETTES["Corr."], decimals: 3},
  "Bias": {label: "Bias", unit: "cm", cmin: -2, cmax: 2, colorscale: PALETTES["Bias"], decimals: 2},
  "RMSE": {label: "RMSE", unit: "cm", cmin: 0, cmax: 22, colorscale: PALETTES["RMSE"], decimals: 2},
  "NRMSE_prct": {label: "NRMSE", unit: "%", cmin: 0, cmax: 24, colorscale: PALETTES["NRMSE_prct"], decimals: 2},
  "NBias": {label: "NBias", unit: "", cmin: -5, cmax: 5, colorscale: PALETTES["NBias"], decimals: 2}
};

let DATA = [];

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];
    if (char === '"' && inQuotes && next === '"') { cell += '"'; i++; }
    else if (char === '"') { inQuotes = !inQuotes; }
    else if (char === ',' && !inQuotes) { row.push(cell); cell = ''; }
    else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && next === '\n') i++;
      row.push(cell);
      if (row.some(v => v.trim() !== '')) rows.push(row);
      row = [];
      cell = '';
    } else { cell += char; }
  }
  if (cell.length > 0 || row.length > 0) {
    row.push(cell);
    if (row.some(v => v.trim() !== '')) rows.push(row);
  }
  const headers = rows.shift().map(h => h.trim());
  return rows.map(r => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (r[i] ?? '').trim());
    return obj;
  });
}

function parseNumber(value) {
  if (value === null || value === undefined) return NaN;
  return Number(String(value).replace(',', '.'));
}

function formatValue(value, decimals, unit) {
  if (!Number.isFinite(value)) return "NaN";
  return value.toFixed(decimals) + (unit ? " " + unit : "");
}

function updateStats(metric) {
  const values = DATA.map(d => d[metric]).filter(Number.isFinite);
  const cfg = METRICS[metric];
  const n = values.length;
  const minv = Math.min(...values);
  const maxv = Math.max(...values);
  const mean = values.reduce((s, v) => s + v, 0) / n;
  const outside = values.filter(v => v < cfg.cmin || v > cfg.cmax).length;
  const unit = cfg.unit ? " " + cfg.unit : "";

  document.getElementById('stats').innerHTML = `
    <span class="pill">N = ${n} estaciones</span>
    <span class="pill">min = ${minv.toFixed(cfg.decimals)}${unit}</span>
    <span class="pill">max = ${maxv.toFixed(cfg.decimals)}${unit}</span>
    <span class="pill">mean = ${mean.toFixed(cfg.decimals)}${unit}</span>
    <span class="pill">rango color = [${cfg.cmin}, ${cfg.cmax}]${unit}</span>
  `;
}

function buildHoverText(d) {
  return (
    "<b>" + d.station + "</b><br>" +
    "Lon: " + d.lon.toFixed(3) + "°<br>" +
    "Lat: " + d.lat.toFixed(3) + "°<br>" +
    "Corr.: " + d["Corr."].toFixed(3) + "<br>" +
    "Bias: " + d.Bias.toFixed(2) + " cm<br>" +
    "RMSE: " + d.RMSE.toFixed(2) + " cm<br>" +
    "NRMSE: " + d.NRMSE_prct.toFixed(2) + " %<br>" +
    "NBias: " + d.NBias.toFixed(2)
  );
}

function makeTrace(metric) {
  const cfg = METRICS[metric];
  return {
    type: 'scattergeo',
    mode: 'markers',
    lon: DATA.map(d => d.lon),
    lat: DATA.map(d => d.lat),
    text: DATA.map(buildHoverText),
    hovertemplate: "%{text}<extra></extra>",
    marker: {
      size: 8,
      color: DATA.map(d => d[metric]),
      cmin: cfg.cmin,
      cmax: cfg.cmax,
      colorscale: cfg.colorscale,
      line: {color: 'black', width: 0.7},
      colorbar: {
        title: cfg.unit ? cfg.label + " [" + cfg.unit + "]" : cfg.label,
        orientation: 'h',
        x: 0.5,
        y: -0.08,
        xanchor: 'center',
        len: 0.65,
        thickness: 18
      }
    }
  };
}

function plotMap(metric) {
  const layout = {
    margin: {l: 10, r: 10, t: 10, b: 70},
    paper_bgcolor: '#ffffff',
    geo: {
      projection: {type: 'natural earth'},
      showland: true,
      landcolor: 'rgb(230,235,225)',
      showocean: true,
      oceancolor: 'rgb(245,248,252)',
      showcountries: true,
      countrycolor: 'rgba(120,120,120,0.45)',
      showcoastlines: true,
      coastlinecolor: 'rgba(70,70,70,0.75)',
      lonaxis: {showgrid: true, gridcolor: 'rgba(120,120,120,0.28)', dtick: 60},
      lataxis: {showgrid: true, gridcolor: 'rgba(120,120,120,0.28)', dtick: 30}
    }
  };
  Plotly.react('plot', [makeTrace(metric)], layout, {responsive: true, scrollZoom: true, displaylogo: false});
  updateStats(metric);
}

function init(rows) {
  DATA = rows.map(r => ({
    station: r.station,
    lon: parseNumber(r.lon),
    lat: parseNumber(r.lat),
    "Corr.": parseNumber(r["Corr"] ?? r["Corr."]),
    Bias: parseNumber(r.Bias),
    RMSE: parseNumber(r.RMSE),
    NRMSE_prct: parseNumber(r.NRMSE_prct),
    NBias: parseNumber(r.NBias)
  })).filter(d =>
    d.station &&
    Number.isFinite(d.lon) &&
    Number.isFinite(d.lat) &&
    Number.isFinite(d["Corr."]) &&
    Number.isFinite(d.Bias) &&
    Number.isFinite(d.RMSE) &&
    Number.isFinite(d.NRMSE_prct) &&
    Number.isFinite(d.NBias)
  );

  if (!DATA.length) throw new Error("El CSV no tiene datos válidos. Debe contener: station, lon, lat, Corr o Corr., Bias, RMSE, NRMSE_prct, NBias.");

  const metricRadios = document.querySelectorAll('input[name="metric"]');

  metricRadios.forEach(radio => {
    radio.addEventListener('change', () => {
      if (radio.checked) {
        plotMap(radio.value);
      }
    });
  });

const initialMetric = document.querySelector('input[name="metric"]:checked').value;
plotMap(initialMetric);
}

fetch('bias_points.csv?cache=' + Date.now())
  .then(response => {
    if (!response.ok) throw new Error('No se pudo leer bias_points.csv');
    return response.text();
  })
  .then(text => init(parseCSV(text)))
  .catch(err => {
    const box = document.getElementById('error');
    box.style.display = 'block';
    box.textContent = err.message;
  });
